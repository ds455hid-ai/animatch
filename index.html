<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<title>ANIMATCH｜動物タイプ組織サポート</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
:root{--ind:#4F46E5;--ind2:#7C3AED;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#e9e9ef;display:flex;justify-content:center;align-items:stretch;}
#app{width:100%;max-width:440px;background:#f2f2f7;min-height:100vh;height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.12);}
@media(min-width:480px){body{align-items:center;padding:20px;}#app{height:calc(100vh - 40px);max-height:900px;border-radius:32px;}}

/* screens */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;background:#f2f2f7;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.scr.active{transform:translateX(0);}
@media(min-width:480px){#app{border-radius:32px;}.scr{border-radius:32px;overflow:hidden;}}

/* header */
.hdr{background:#fff;padding:14px 18px;border-bottom:1px solid #e5e5ea;display:flex;align-items:center;gap:10px;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top));}
.hdr .back{font-size:16px;color:var(--ind);cursor:pointer;border:none;background:none;font-weight:500;padding:4px 0;}
.hdr h1{font-size:16px;font-weight:800;color:#1c1c1e;flex:1;}
.hdr .logo{font-size:19px;font-weight:900;color:var(--ind);letter-spacing:-1px;line-height:1;}
.hdr .sub{font-size:10px;color:#8e8e93;margin-top:2px;}
.hdr .act{font-size:14px;color:var(--ind);font-weight:600;border:none;background:none;cursor:pointer;}

.scroll{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:11px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.ctitle{font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px;}

/* staff row */
.add-btn{width:100%;background:#EEF2FF;color:var(--ind);border:1.5px dashed #C7D2FE;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:11px;}
.add-btn:active{background:#E0E7FF;}
.srow{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #f4f4f6;cursor:pointer;}
.srow:last-child{border-bottom:none;}
.srow:active{opacity:.55;}
.semoji{font-size:26px;width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sinfo{flex:1;min-width:0;}
.sname{font-size:14px;font-weight:700;color:#1c1c1e;}
.ssub{font-size:11px;color:#8e8e93;margin-top:2px;}
.gbadge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;display:inline-block;}
.g-MOON{background:#EDE9FE;color:#7C3AED;}.g-EARTH{background:#DBEAFE;color:#2563EB;}.g-SUN{background:#FEF3C7;color:#D97706;}
.chev{color:#C7C7CC;font-size:14px;}
.empty{text-align:center;color:#8e8e93;font-size:13px;padding:30px 10px;line-height:1.7;}

/* detail */
.dhero{padding:22px 20px;text-align:center;color:#fff;flex-shrink:0;}
.dhero .em{font-size:58px;line-height:1;}
.dhero .ch{font-size:12px;font-weight:600;opacity:.92;margin-top:7px;}
.dhero .an{font-size:24px;font-weight:900;margin-top:1px;}
.dhero .gb{display:inline-block;margin-top:9px;font-size:11px;font-weight:700;background:rgba(255,255,255,.25);padding:3px 13px;border-radius:20px;}
.dhero .bd{font-size:10px;opacity:.78;margin-top:8px;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5ea;flex-shrink:0;}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;color:#8e8e93;border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;}
.tab.active{color:var(--ind);border-bottom-color:var(--ind);}
.irow{margin-bottom:11px;}
.ilabel{font-size:11px;font-weight:700;color:#8e8e93;margin-bottom:3px;}
.ival{font-size:13px;color:#1c1c1e;line-height:1.65;white-space:pre-line;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;}
.chip{font-size:11.5px;padding:4px 9px;border-radius:18px;line-height:1.4;}
.chip.g{background:#ECFDF5;color:#065F46;}.chip.b{background:#FEF2F2;color:#991B1B;}
.box{border-radius:11px;padding:12px;margin-bottom:9px;}
.box .bl{font-size:11px;font-weight:700;margin-bottom:5px;}
.box .bv{font-size:12.5px;line-height:1.65;white-space:pre-line;color:#1c1c1e;}
.del-btn{width:100%;background:#fff;color:#EF4444;border:1px solid #FECACA;border-radius:11px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;}

/* nav */
.nav{display:flex;background:#fff;border-top:1px solid #e5e5ea;padding:7px 0;padding-bottom:max(7px,env(safe-area-inset-bottom));flex-shrink:0;}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:3px 0;}
.nicon{font-size:21px;}
.nlabel{font-size:9.5px;font-weight:600;color:#8e8e93;}
.nitem.active .nlabel{color:var(--ind);}

/* compat */
.pick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.pick{background:#fff;border:2px solid #e9e9ee;border-radius:11px;padding:8px 2px;text-align:center;cursor:pointer;transition:.12s;}
.pick.sel{border-color:var(--ind);background:#EEF2FF;}
.pick .pe{font-size:24px;display:block;}
.pick .pn{font-size:10px;font-weight:700;color:#1c1c1e;margin-top:1px;}
.score-big{font-size:52px;font-weight:900;text-align:center;margin:4px 0;}
.score-lbl{text-align:center;font-size:13px;font-weight:700;color:#8e8e93;margin-bottom:4px;}
.citem{margin-bottom:10px;}.chead{font-size:11px;font-weight:700;color:#8e8e93;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}.cbody{font-size:12.5px;color:#1c1c1e;line-height:1.65;}

/* org */
.dist{margin-bottom:9px;}
.dist-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
.dist-bar{background:#F3F4F6;border-radius:20px;height:9px;overflow:hidden;}
.dist-fill{height:100%;border-radius:20px;transition:width .5s;}

/* position */
.pos-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:11px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.pos-name{font-size:14px;font-weight:800;color:#1c1c1e;margin-bottom:2px;}
.pos-desc{font-size:11px;color:#8e8e93;margin-bottom:9px;}
.pos-tier{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;}
.pos-tag{font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px;flex-shrink:0;width:42px;text-align:center;}
.pt-best{background:#DCFCE7;color:#15803D;}.pt-ok{background:#FEF9C3;color:#A16207;}.pt-no{background:#FEE2E2;color:#B91C1C;}
.pos-animals{font-size:13px;line-height:1.55;}

/* sheet (add staff) */
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.25s;z-index:50;}
.sheet-bg.show{opacity:1;pointer-events:auto;}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;padding:20px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:51;}
.sheet.show{transform:translateY(0);}
.sheet h2{font-size:17px;font-weight:800;color:#1c1c1e;margin-bottom:16px;}
.field{margin-bottom:13px;}
.field label{font-size:11px;color:#8e8e93;font-weight:700;display:block;margin-bottom:5px;}
.field input{width:100%;border:2px solid #e5e5ea;border-radius:10px;padding:11px;font-size:16px;font-weight:600;color:#1c1c1e;outline:none;}
.field input:focus{border-color:var(--ind);}
.date3{display:flex;gap:8px;align-items:flex-end;}
.date3 .field{flex:1;margin-bottom:0;}
.date3 input{text-align:center;}
.date3 span{font-size:12px;color:#8e8e93;font-weight:600;padding-bottom:12px;}
.preview{background:#F5F3FF;border-radius:11px;padding:12px;margin:14px 0;display:flex;align-items:center;gap:11px;min-height:60px;}
.preview .pem{font-size:34px;}
.preview .pinfo{flex:1;}
.preview .pan{font-size:16px;font-weight:800;color:#1c1c1e;}
.preview .pch{font-size:11px;color:#8e8e93;}
.preview .ph{font-size:12px;color:#8e8e93;}
.sheet-save{width:100%;background:linear-gradient(135deg,var(--ind),var(--ind2));color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(79,70,229,.3);}
.sheet-save:disabled{opacity:.4;box-shadow:none;}
.sheet-cancel{width:100%;background:none;color:#8e8e93;border:none;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}

.note{font-size:10.5px;color:#8e8e93;text-align:center;padding:10px 14px 20px;line-height:1.6;}
.disclaimer{background:#FFFBEB;border:1px solid #FDE68A;border-radius:11px;padding:11px 13px;font-size:11px;color:#92400E;line-height:1.6;margin-bottom:11px;}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="scr active" id="s-home">
    <div class="hdr">
      <div style="flex:1"><div class="logo">ANIMATCH</div><div class="sub" id="home-sub">動物タイプ組織サポート</div></div>
      <button class="act" onclick="resetData()">⟳ サンプル</button>
    </div>
    <div class="scroll">
      <div class="disclaimer">この結果は動物占いをもとにした<b>コミュニケーション支援</b>です。人事評価・採用選考の判断には使わないでください。データは端末内にのみ保存され、外部に送信されません。</div>
      <button class="add-btn" onclick="openSheet()">＋ スタッフを追加</button>
      <div class="card" style="padding:8px 14px"><div class="ctitle">スタッフ一覧（タップでカルテ）</div><div id="staff-list"></div></div>
      <div class="note">生年月日を入力すると、動物占いの正式ロジックでタイプを自動判定します。</div>
    </div>
    <div class="nav" id="nav-home"></div>
  </div>

  <!-- DETAIL -->
  <div class="scr" id="s-detail">
    <div class="hdr"><button class="back" onclick="go('s-home')">‹ 戻る</button><h1 id="d-name"></h1></div>
    <div id="d-hero" class="dhero"></div>
    <div class="tabs"><button class="tab active" id="t-k" onclick="dtab('k')">個人カルテ</button><button class="tab" id="t-a" onclick="dtab('a')">管理者 攻略カード</button></div>
    <div class="scroll" id="d-karte"></div>
    <div class="scroll" id="d-attack" style="display:none"></div>
  </div>

  <!-- COMPAT -->
  <div class="scr" id="s-compat">
    <div class="hdr"><div><div class="logo" style="font-size:16px">相性診断</div><div class="sub">2タイプの組み合わせを自動分析</div></div></div>
    <div class="scroll">
      <div class="card"><div class="ctitle">① 1人目のタイプ</div><div class="pick-grid" id="pickA"></div></div>
      <div class="card"><div class="ctitle">② 2人目のタイプ</div><div class="pick-grid" id="pickB"></div></div>
      <div id="compat-out"></div>
    </div>
    <div class="nav" id="nav-compat"></div>
  </div>

  <!-- ORG -->
  <div class="scr" id="s-org">
    <div class="hdr"><div><div class="logo" style="font-size:16px">組織分析</div><div class="sub">在籍スタッフから自動算出</div></div></div>
    <div class="scroll" id="org-body"></div>
    <div class="nav" id="nav-org"></div>
  </div>

  <!-- POSITION -->
  <div class="scr" id="s-pos">
    <div class="hdr"><div><div class="logo" style="font-size:16px">ポジション適性</div><div class="sub">サービス業の配置ヒント</div></div></div>
    <div class="scroll" id="pos-body"></div>
    <div class="nav" id="nav-pos"></div>
  </div>

  <!-- ADD SHEET -->
  <div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
    <h2>スタッフを追加</h2>
    <div class="field"><label>名前</label><input id="f-name" placeholder="例：山田 花子" oninput="updatePreview()"></div>
    <div class="field"><label>役割（任意）</label><input id="f-role" placeholder="例：仲居 / フロント" oninput="updatePreview()"></div>
    <label style="font-size:11px;color:#8e8e93;font-weight:700;display:block;margin-bottom:5px;">生年月日</label>
    <div class="date3">
      <div class="field"><input id="f-y" type="number" inputmode="numeric" placeholder="1990" oninput="updatePreview()"></div><span>年</span>
      <div class="field"><input id="f-m" type="number" inputmode="numeric" placeholder="4" oninput="updatePreview()"></div><span>月</span>
      <div class="field"><input id="f-d" type="number" inputmode="numeric" placeholder="15" oninput="updatePreview()"></div><span>日</span>
    </div>
    <div class="preview" id="preview"><div class="ph">↑ 生年月日を入れると動物タイプが表示されます</div></div>
    <button class="sheet-save" id="save-btn" onclick="saveStaff()" disabled>保存する</button>
    <button class="sheet-cancel" onclick="closeSheet()">キャンセル</button>
  </div>

</div>

<script>
/* ═══════════════ 検証済み判定エンジン ═══════════════ */
/* 運命数 = (エクセル日付シリアル + 8) mod 60 + 1
   検証: 1995/2/12→11→正直なこじか, 2000/1/1→55→パワフルな虎 */
const CHARS=[null,["長距離ランナーのチータ","チータ"],["社交家のたぬき","たぬき"],["落ち着きのない猿","猿"],["フットワークの軽い子守熊","子守熊"],["面倒見のいい黒ひょう","黒ひょう"],["愛情あふれる虎","虎"],["全力疾走するチータ","チータ"],["磨き上げられたたぬき","たぬき"],["大きな志をもった猿","猿"],["母性豊かな子守熊","子守熊"],["正直なこじか","こじか"],["人気者のゾウ","ゾウ"],["ネアカの狼","狼"],["協調性のないひつじ","ひつじ"],["どっしりとした猿","猿"],["コアラのなかの子守熊","子守熊"],["強い意志をもったこじか","こじか"],["デリケートなゾウ","ゾウ"],["放浪の狼","狼"],["物静かなひつじ","ひつじ"],["落ち着きのあるペガサス","ペガサス"],["強靭な翼をもつペガサス","ペガサス"],["無邪気なひつじ","ひつじ"],["クリエイティブな狼","狼"],["穏やかな狼","狼"],["粘り強いひつじ","ひつじ"],["波乱に満ちたペガサス","ペガサス"],["優雅なペガサス","ペガサス"],["チャレンジ精神旺盛なひつじ","ひつじ"],["順応性のある狼","狼"],["リーダーとなるゾウ","ゾウ"],["しっかり者のこじか","こじか"],["活動的な子守熊","子守熊"],["気分屋の猿","猿"],["頼られると嬉しいひつじ","ひつじ"],["好感のもたれる狼","狼"],["まっしぐらに突き進むゾウ","ゾウ"],["華やかなこじか","こじか"],["夢とロマンの子守熊","子守熊"],["尽す猿","猿"],["大器晩成のたぬき","たぬき"],["足腰の強いチータ","チータ"],["動きまわる虎","虎"],["情熱的な黒ひょう","黒ひょう"],["サービス精神旺盛な子守熊","子守熊"],["守りの猿","猿"],["人間味あふれるたぬき","たぬき"],["品格のあるチータ","チータ"],["ゆったりとした悠然の虎","虎"],["落ち込みの激しい黒ひょう","黒ひょう"],["我が道を行くライオン","ライオン"],["統率力のあるライオン","ライオン"],["感情豊かな黒ひょう","黒ひょう"],["楽天的な虎","虎"],["パワフルな虎","虎"],["気どらない黒ひょう","黒ひょう"],["感情的なライオン","ライオン"],["傷つきやすいライオン","ライオン"],["束縛を嫌う黒ひょう","黒ひょう"],["慈悲深い虎","虎"]];
function unmei(y,m,d){const r=Math.round((Date.UTC(y,m-1,d)-Date.UTC(1900,0,1))/86400000)+2;return ((r+8)%60)+1;}
function animalOf(y,m,d){return CHARS[unmei(y,m,d)];}

/* ═══ グループ・絵文字 ═══ */
const GROUP={"こじか":"MOON","黒ひょう":"MOON","ひつじ":"MOON","たぬき":"MOON","狼":"EARTH","猿":"EARTH","虎":"EARTH","子守熊":"EARTH","チータ":"SUN","ライオン":"SUN","ゾウ":"SUN","ペガサス":"SUN"};
const GMETA={MOON:{bg:"linear-gradient(135deg,#7C3AED,#6D28D9)",label:"MOON（人間関係重視）",value:"人との和を大切にする",weak:"対立を避けて本音が出にくい",axis:"和と気持ち"},EARTH:{bg:"linear-gradient(135deg,#2563EB,#1D4ED8)",label:"EARTH（現実主義）",value:"現実的に成果を積む",weak:"こだわりが強くぶつかりやすい",axis:"成果と現実"},SUN:{bg:"linear-gradient(135deg,#F59E0B,#D97706)",label:"SUN（感性重視）",value:"感性と可能性を大切にする",weak:"気分や勢いにムラが出る",axis:"感性と自由"}};
const BEATS={MOON:"EARTH",EARTH:"SUN",SUN:"MOON"};
const EMOJI={"チータ":"🐆","たぬき":"🦝","猿":"🐒","子守熊":"🐨","黒ひょう":"🐈‍⬛","虎":"🐯","こじか":"🦌","ゾウ":"🐘","狼":"🐺","ひつじ":"🐑","ペガサス":"🦄","ライオン":"🦁"};
function gbg(g){return g==="MOON"?"#EDE9FE":g==="EARTH"?"#DBEAFE":"#FEF3C7";}

/* ═══ 12動物データ ═══ */
const P={

function enrich(s){const[ch,an]=animalOf(s.y,s.m,s.d);return{...s,chara:ch,animal:an,group:GROUP[an]};}
function load(){let raw;try{raw=JSON.parse(localStorage.getItem(KEY));}catch(e){}STAFF=(raw&&raw.length?raw:SAMPLE).map(enrich);}

function buildStaff(){

 const el=document.getElementById('staff-list');
 if(!STAFF.length){el.innerHTML=`<div class="empty">まだスタッフがいません。<br>上の「＋ スタッフを追加」から登録してください。</div>`;return;}

}
function esc(t){return(t||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function updatePreview(){const f=readForm();const pv=document.getElementById('preview');const btn=document.getElementById('save-btn');

 else{pv.innerHTML=`<div class="ph">↑ 生年月日を入れると動物タイプが表示されます</div>`;}

let selA="ライオン",selB="ひつじ";
function buildPicks(){

}
function setPick(s,a){if(s==='A')selA=a;else selB=a;buildPicks();calcCompat();}
function calcCompat(){
 const a=selA,b=selB,ga=GROUP[a],gb=GROUP[b];let score,label,good,clash,advice;
 if(a===b){score=70;label="鏡うつし";good=`同じ${a}型どうし。価値観が同じで説明不要のツーカー。`;clash="弱みも同じ。二人とも同じ場面でつまずき、短所が増幅する。";advice="役割を少しずらし、片方が苦手を補う配置を意識する。";}
 else if(ga===gb){score=76;label="同グループ";good=`同じ${ga}グループ。「${GMETA[ga].value}」という土台が同じで安心して組める。`;clash=`似た者どうしゆえ、${ga}共通の弱点（${GMETA[ga].weak}）が両方に出やすい。`;advice="違うグループのメンバーを一人混ぜると視点が補える。";}
 else{const aWins=BEATS[ga]===gb;const W=aWins?a:b,L=aWins?b:a,gW=aWins?ga:gb,gL=aWins?gb:ga;
  score=66;label="じゃんけん関係";
  good=`${W}（${gW}）の伝え方が${L}（${gL}）に届きやすい関係。${W}が引っ張り${L}が支えると噛み合う。`;
  clash=`優先するものが違う。「${GMETA[ga].axis}」を大切にする${a} と 「${GMETA[gb].axis}」を大切にする${b} でペースがずれる。`;
  advice=`${W}がリード役、${L}が実務役と役割を明文化すると安定する。`;}
 document.getElementById('compat-out').innerHTML=`
  <div class="card" style="text-align:center"><div class="ctitle">相性スコア</div><div class="score-big" style="color:${score>=74?'#10B981':score>=68?'#F59E0B':'#6366F1'}">${score}<span style="font-size:20px">点</span></div><div class="score-lbl">${EMOJI[a]}${a} × ${EMOJI[b]}${b} ・ ${label}</div></div>
  <div class="card"><div class="citem"><div class="chead">相性の良い点</div><div class="cbody">✅ ${good}</div></div><div class="citem"><div class="chead">衝突しやすいポイント</div><div class="cbody">⚠️ ${clash}</div></div><div class="citem"><div class="chead">関係改善アドバイス</div><div class="cbody">💡 ${advice}</div></div></div>`;
}

/* ═══ 組織分析 ═══ */
function buildOrg(){
 const body=document.getElementById('org-body');
 if(!STAFF.length){body.innerHTML=`<div class="empty">スタッフを登録すると組織分析が表示されます。</div>`;return;}
 const cnt={MOON:0,EARTH:0,SUN:0},acnt={};STAFF.forEach(s=>{cnt[s.group]++;acnt[s.animal]=(acnt[s.animal]||0)+1;});
 const tot=STAFF.length;const gcol={MOON:"#7C3AED",EARTH:"#2563EB",SUN:"#F59E0B"};
 const missing=ALL12.filter(a=>!acnt[a]);
 const sorted=Object.entries(cnt).sort((x,y)=>y[1]-x[1]);
 const top=sorted[0],bottom=sorted[2];
 body.innerHTML=`
  <div class="card"><div class="ctitle">3グループ分布（${tot}名）</div>${["MOON","EARTH","SUN"].map(g=>`<div class="dist"><div class="dist-top"><span style="font-weight:700;color:${gcol[g]}">${g}</span><span style="color:#8e8e93">${cnt[g]}名</span></div><div class="dist-bar"><div class="dist-fill" style="background:${gcol[g]};width:${cnt[g]/tot*100}%"></div></div></div>`).join('')}<div style="font-size:11px;color:#8e8e93;margin-top:6px">${top[1]===bottom[1]?'バランスよく分散しています。':`${top[0]}が最多・${bottom[0]}が最少。バランスに偏りがあります。`}</div></div>
  <div class="card"><div class="ctitle" style="color:#D97706">⚡ 組織の強み</div><div class="ival">${top[0]}グループが厚い＝${GMETA[top[0]].value}文化が根づいています。この強みを軸にできます。</div></div>
  <div class="card"><div class="ctitle" style="color:#EF4444">⚠ 組織の弱み・離職リスク</div><div class="ival">${bottom[0]}グループが手薄＝「${GMETA[bottom[0]].value}」役割が不足。${bottom[0]}型の人は少数ゆえ孤立しやすく、離職リスクが高まります。定期的な声がけを。</div></div>
  <div class="card"><div class="ctitle" style="color:#4F46E5">📋 不足タイプ（採用で補う）</div>${missing.length?`<div class="chips">${missing.map(a=>`<span class="chip" style="background:#F3F4F6;color:#374151">${EMOJI[a]} ${a}</span>`).join('')}</div><div style="font-size:11px;color:#8e8e93;margin-top:8px">在籍ゼロのタイプ。${bottom[0]}グループから優先的に補うとバランスが整います。</div>`:`<div class="ival">全12タイプが揃っています。理想的な多様性です。</div>`}</div>
  <div class="card"><div class="ctitle">🤝 強いチーム編成の例</div><div class="ival">接客：ひつじ(気配り)×猿(明るさ)×虎/ライオン(即断)\n調理：狼(技術)×ゾウ(粘り)×子守熊(安定)\n\n衝突注意：ライオン×ライオン（主導権争い）、狼×猿（ペースが逆）→ 間に虎・たぬきを置くと緩和。</div></div>`;
}

/* ═══ ポジション適性 ═══ */
function buildPos(){
 document.getElementById('pos-body').innerHTML=`<div style="font-size:11px;color:#8e8e93;padding:2px 4px 10px;line-height:1.5">各ポジションに向く動物タイプ。傾向であり絶対ではなく、本人の意欲を優先した上での参考に。</div>`+POS.map(p=>`
  <div class="pos-card"><div class="pos-name">${p.n}</div><div class="pos-desc">${p.d}</div>
   <div class="pos-tier"><span class="pos-tag pt-best">最適</span><span class="pos-animals">${p.best.map(a=>EMOJI[a]+a).join(' ')}</span></div>
   <div class="pos-tier"><span class="pos-tag pt-ok">許容</span><span class="pos-animals">${p.ok.map(a=>EMOJI[a]+a).join(' ')}</span></div>
   <div class="pos-tier"><span class="pos-tag pt-no">注意</span><span class="pos-animals">${p.no.map(a=>EMOJI[a]+a).join(' ')}</span></div>
  </div>`).join('');
}

/* ═══ ナビ ═══ */
const NAV=[["s-home","🏠","ホーム"],["s-compat","💫","相性"],["s-org","📊","組織"],["s-pos","🎯","適性"]];
function buildNav(){["home","compat","org","pos"].forEach(k=>{const cur="s-"+k;const nav=document.getElementById("nav-"+k);if(nav)nav.innerHTML=NAV.map(([id,ic,lb])=>`<button class="nitem${cur===id?' active':''}" onclick="go('${id}')"><span class="nicon">${ic}</span><span class="nlabel">${lb}</span></button>`).join('');});}
function go(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='s-compat'){buildPicks();calcCompat();}if(id==='s-org')buildOrg();if(id==='s-pos')buildPos();window.scrollTo&&document.querySelector('#'+id+' .scroll')?.scrollTo(0,0);}

/* ═══ 起動 ═══ */
load();buildStaff();buildNav();buildPicks();calcCompat();
</script>
</body>
</html>
